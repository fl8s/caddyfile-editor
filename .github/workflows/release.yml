name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: bun install

      - name: Generate Frontend Assets
        run: go generate ./...

      - name: Run Tests
        run: go test -v ./...

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Build Caddy with Plugin (Linux AMD64)
        run: |
          xcaddy build --with github.com/fl8s/caddyfile-editor=./ \
            --output caddy-linux-amd64
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64

      - name: Build Caddy with Plugin (Windows AMD64)
        run: |
          xcaddy build --with github.com/fl8s/caddyfile-editor=./ \
            --output caddy-windows-amd64.exe
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64

      - name: Build Caddy with Plugin (macOS AMD64)
        run: |
          xcaddy build --with github.com/fl8s/caddyfile-editor=./ \
            --output caddy-darwin-amd64
        env:
          CGO_ENABLED: 0
          GOOS: darwin
          GOARCH: amd64

      - name: Build Caddy with Plugin (macOS ARM64)
        run: |
          xcaddy build --with github.com/fl8s/caddyfile-editor=./ \
            --output caddy-darwin-arm64
        env:
          CGO_ENABLED: 0
          GOOS: darwin
          GOARCH: arm64

      - name: Build Caddy with Plugin (Linux ARM64)
        run: |
          xcaddy build --with github.com/fl8s/caddyfile-editor=./ \
            --output caddy-linux-arm64
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: arm64

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: caddy-binaries
          path: |
            caddy-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: caddy-binaries

      - name: Generate Release Tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            caddy-*
          prerelease: ${{ steps.tag.outputs.tag == 'latest' }}
          generate_release_notes: true
